<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alke Wallet - Menú</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="assets/css/estilos.css">
</head>
<body class="bg-light">

  <!-- Barra de navegación -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="#"><i class="bi bi-wallet2"></i> Alke Wallet</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="deposito.html"><i class="bi bi-bank"></i> Depósitos</a></li>
          <li class="nav-item"><a class="nav-link" href="sendmoney.html"><i class="bi bi-cash-stack"></i> Enviar Dinero</a></li>
          <li class="nav-item"><a class="nav-link" href="transacciones.html"><i class="bi bi-list-check"></i> Movimientos</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html"><i class="bi bi-box-arrow-right"></i> Salir</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Contenedor principal -->
  <div class="container mt-5">
    <!-- Saldo disponible -->
    <div class="text-center mb-4">
      <h3 class="text-secondary">Saldo disponible</h3>
      <h2 id="saldo" class="fw-bold text-success"></h2>
      <p id="ultimoDeposito" class="mt-2 text-primary"></p>
      <p id="ultimoEnvio" class="mt-2 text-danger"></p>
    </div>

    <!-- Tarjetas de resumen financiero -->
    <div class="row">
      <div class="col-md-4 mb-3">
        <div class="card shadow h-100">
          <div class="card-body text-center">
            <i class="bi bi-bank fs-1 text-primary"></i>
            <h5 class="card-title mt-2">Depósitos</h5>
            <p id="depositos" class="card-text"></p>
          </div>
        </div>
      </div>
      <div class="col-md-4 mb-3">
        <div class="card shadow h-100">
          <div class="card-body text-center">
            <i class="bi bi-cash-coin fs-1 text-success"></i>
            <h5 class="card-title mt-2">Envíos</h5>
            <p id="envios" class="card-text"></p>
          </div>
        </div>
      </div>
      <div class="col-md-4 mb-3">
        <div class="card shadow h-100">
          <div class="card-body text-center">
            <i class="bi bi-journal-text fs-1 text-warning"></i>
            <h5 class="card-title mt-2">Historial</h5>
            <p class="card-text">Ver historial</p>
            <a href="transacciones.html" class="btn btn-outline-primary btn-sm">Ver más</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- Archivos JS -->
  <script src="assets/js/transacciones.js"></script>
  <script src="assets/js/menu.js"></script>
</body>
</html>
