<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alke Wallet - Menú</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  link rel="stylesheet" href="assets/css/estilos.css">

</head>
<body>
  <!-- Barra de navegación -->
  <nav class="navbar navbar-expand-lg navbar-dark" style="background-color: #fb08b6;">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Alke Wallet</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="deposit.html">Depósitos</a></li>
          <li class="nav-item"><a class="nav-link" href="sendmoney.html">Enviar Dinero</a></li>
          <li class="nav-item"><a class="nav-link" href="transactions.html">Movimientos</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">Salir</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Contenedor principal -->
  <div class="container mt-5">
    <!-- Saldo disponible -->
    <div class="text-center mb-4">
      <h3>Saldo disponible</h3>
      <h2 id="saldo" class="text-success">$1000</h2>
    </div>

    <!-- Tarjetas de resumen financiero -->
    <div class="row">
      <div class="col-md-4 mb-3">
        <div class="card shadow">
          <div class="card-body text-center">
            <h5 class="card-title">Depósitos</h5>
            <p class="card-text">$500</p>
          </div>
        </div>
      </div>
      <div class="col-md-4 mb-3">
        <div class="card shadow">
          <div class="card-body text-center">
            <h5 class="card-title">Envíos</h5>
            <p class="card-text">$300</p>
          </div>
        </div>
      </div>
      <div class="col-md-4 mb-3">
        <div class="card shadow">
          <div class="card-body text-center">
            <h5 class="card-title">Últimos Movimientos</h5>
            <p class="card-text">Ver historial</p>
            <a href="transaccion.html" class="btn btn-outline-primary btn-sm">Ver más</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
