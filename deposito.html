<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alke Wallet - Depósitos</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <!-- Estilos personalizados -->
  <link rel="stylesheet" href="assets/css/estilos.css">
</head>
<body class="bg-light">

  <!-- Barra de navegación -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
    <div class="container-fluid">
      <a class="navbar-brand fw-bold" href="#"><i class="bi bi-wallet2"></i> Alke Wallet</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="menu.html"><i class="bi bi-house-door"></i> Menú</a></li>
          <li class="nav-item"><a class="nav-link" href="sendmoney.html"><i class="bi bi-cash-stack"></i> Enviar Dinero</a></li>
          <li class="nav-item"><a class="nav-link" href="transactions.html"><i class="bi bi-list-check"></i> Movimientos</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html"><i class="bi bi-box-arrow-right"></i> Salir</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Contenedor principal -->
  <div class="container d-flex justify-content-center mt-5">
    <div class="card p-4 shadow" style="width: 400px;">
      <h2 class="text-center mb-4"><i class="bi bi-bank"></i> Depósitos</h2>

      <form id="depositForm">
        <div class="input-group mb-3">
          <span class="input-group-text"><i class="bi bi-currency-dollar"></i></span>
          <input type="number" id="montoDeposito" class="form-control" placeholder="Monto a depositar" min="1" required>
        </div>
        <button type="submit" class="btn btn-success w-100">
          <i class="bi bi-plus-circle"></i> Realizar depósito
        </button>
      </form>

      <!-- Mensaje dinámico -->
      <div id="mensaje" class="alert alert-info mt-3 d-none text-center"></div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- jQuery -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <!-- Lógica JS -->
   <script src="assets/js/transacciones.js"></script>
  <script src="assets/js/deposito.js"></script>
  <script src="assets/js/menu.js"></script>
</body>
</html>
