<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alke Wallet - Depósitos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/estilos.css">
</head>

<body>
  <div class="container d-flex justify-content-center mt-5">
    <div class="card p-4 shadow" style="width: 350px;">
      <h2 class="text-center mb-4">Depósitos</h2>

      <form id="depositForm">
        <input type="number" id="montoDeposito" class="form-control mb-3" placeholder="Monto a depositar" required>
        <button type="submit" class="btn btn-success w-100">Realizar depósito</button>
      </form>

      <div id="mensaje" class="mt-3 text-center"></div>
    </div>
  </div>

  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <script src="assets/js/deposito.js"></script>
  <script src="assets/js/menu.js"></script>


</body>

</html>
