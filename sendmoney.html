<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Enviar Dinero</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- jQuery y jQuery UI -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.js"></script>
  <link rel="stylesheet" href="assets/css/estilos.css">
</head>

<body class="bg-light">

  <div class="container mt-5">
    <div class="card shadow">
      <div class="card-header bg-primary text-white">
        <h2 class="mb-0"><i class="bi bi-cash-stack"></i> Enviar Dinero</h2>
      </div>
      <div class="card-body">
      <form id="sendMoneyForm">
  <div class="mb-3">
    <label for="destinatario" class="form-label">Destinatario</label>
    <input type="text" class="form-control" id="destinatario" placeholder="Escribe un nombre o correo">
  </div>
  <div class="mb-3">
    <label for="monto" class="form-label">Monto</label>
    <input type="number" class="form-control" id="monto" placeholder="Ingrese monto">
  </div>
  <button type="submit" class="btn btn-primary w-100">Enviar</button>
</form>
<div id="resultado" class="mt-3"></div>

<!-- jQuery -->
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<!-- jQuery UI -->
<link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
<script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>

<!-- Archivos JS -->
<script src="assets/js/transacciones.js"></script>
<script src="assets/js/sendmoney.js"></script>

</body>

</html>
