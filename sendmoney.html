<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Enviar Dinero</title>
  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- jQuery y jQuery UI -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.js"></script>
   <link rel="stylesheet" href="assets/css/estilos.css">
</head>
<body class="bg-light">

  <div class="container mt-5">
    <div class="card shadow">
      <div class="card-header bg-primary text-white">
        <h2 class="mb-0"><i class="bi bi-cash-stack"></i> Enviar Dinero</h2>
      </div>
      <div class="card-body">
        <form id="sendMoneyForm" class="mb-3">
          <div class="mb-3 input-group">
            <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
            <input type="text" id="destinatario" name="destinatario" class="form-control" placeholder="Destinatario" required>
          </div>

          <div class="mb-3 input-group">
            <span class="input-group-text"><i class="bi bi-currency-dollar"></i></span>
            <input type="number" id="monto" name="monto" class="form-control" placeholder="Monto" min="1" required>
          </div>

          <button type="submit" class="btn btn-success w-100">
            <i class="bi bi-send-fill"></i> Enviar
          </button>
        </form>

        <p id="saldo" class="fw-bold">Saldo actual: $1000</p>
        <div id="resultado" class="alert alert-info d-none"></div>

        <h4 class="mt-4"><i class="bi bi-journal-text"></i> Historial de transacciones</h4>
        <ul id="historial" class="list-group"></ul>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Tu lógica en archivo externo -->
  <script src="assets/js/sendmoney.js"></script>
</body>
</html>
