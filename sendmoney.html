<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Enviar Dinero</title>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/estilos.css">
</head>
<body>
  <div class="container mt-4">
    <h2>Enviar Dinero</h2>
    <button id="btnNuevoContacto" class="btn btn-secondary mb-3">Agregar nuevo contacto</button>

    <select id="contactos" class="form-select mb-3"></select>
    <input type="number" id="montoEnviar" class="form-control mb-3" placeholder="Monto a enviar">
    <button id="btnEnviarDinero" class="btn btn-primary">Enviar dinero</button>

    <div id="mensaje" class="mt-3"></div>
  </div>

  <!-- Modal para nuevo contacto -->
  <div class="modal fade" id="modalContacto" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Nuevo contacto</h5></div>
        <div class="modal-body">
          <input type="text" id="nombre" class="form-control mb-2" placeholder="Nombre y apellido">
          <input type="text" id="cbu" class="form-control mb-2" placeholder="Número de CBU">
          <input type="text" id="alias" class="form-control mb-2" placeholder="Alias">
          <input type="text" id="banco" class="form-control mb-2" placeholder="Banco">
        </div>
        <div class="modal-footer">
          <button id="guardarContacto" class="btn btn-success">Guardar</button>
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/sendmoney.js"></script>
 <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
    crossorigin="anonymous"></script>
</body>
</html>
