<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Enviar Dinero</title>
  <!-- jQuery y jQuery UI -->
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <link rel="stylesheet" href="https://code.jquery.com/ui/1.13.2/themes/base/jquery-ui.css">
  <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.js"></script>
</head>
<body>
  <h2>Enviar Dinero</h2>

  <form id="sendMoneyForm">
    <label for="destinatario">Destinatario:</label>
    <input type="text" id="destinatario" name="destinatario" required>

    <label for="monto">Monto:</label>
    <input type="number" id="monto" name="monto" min="1" required>

    <button type="submit">Enviar</button>
  </form>

  <p id="saldo">Saldo actual: $1000</p>
  <div id="resultado"></div>

  <!-- Tu lógica en archivo externo -->
  <script src="assets/js/sendmoney.js"></script>
</body>
</html>
