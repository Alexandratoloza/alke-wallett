<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - El Desfalcador</title>
  <link rel="stylesheet" href="/css/index5.css">
</head>
<body>
  <div class="login-container">
    <h1>Bienvenido a El Desfalcador</h1>
    <form id="loginForm">
      <label for="email">Correo electrónico:</label>
      <input type="email" id="email" name="email" required placeholder="usuario@desfalcador.cl">

      <label for="password">Contraseña:</label>
      <input type="password" id="password" name="password" required placeholder="********">

      <div class="buttons">
        <button type="submit" id="btnAceptar">Aceptar</button>
        <button type="button" id="btnCancelar">Cancelar</button>
      </div>
    </form>
    <div id="errorMsg" class="error"></div>
  </div>

  <script src="/js/index5.js"></script>
</body>
</html>
